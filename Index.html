  <style>
    body {
      font-family: 'Segoe UI', sans-serif;

    }
    header {
      background: #2b2b2b;
      padding: 20px;
      text-align: center;

    header h1 {
      margin: 0;

      color: #ffffff;

      text-align: center;

      box-shadow: 0 2px 12px rgba(0,0,0,0.2);

      text-align: center;

    .product:hover {
      transform: translateY(-5px);

    .product img {

      border-radius: 10px;

      margin: 12px 0;
      color: #f5f5f5;
    }
    .product a {
      display: inline-block;
      margin-top: 14px;
      background: #d8a7b1;
      color: #1f1f1f;
      font-weight: bold;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.25s;
    }
    .product a:hover {
      background: #c8919d;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
